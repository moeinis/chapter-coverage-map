name: CI Smoke

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock.txt

      - name: Compile check
        run: |
          python -m py_compile app.py map_api.py

      - name: API import smoke
        run: |
          python -c "import map_api; print('map_api_import_ok')"
