name: CI Smoke

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.14"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock.txt
          pip install ruff

      - name: Lint check
        run: |
          python -m ruff check app.py map_api.py shared_config.py scripts/ci_api_smoke.py

      - name: Compile check
        run: |
          python -m py_compile app.py map_api.py shared_config.py scripts/ci_api_smoke.py

      - name: API import smoke
        run: |
          python -c "import map_api; print('map_api_import_ok')"

      - name: API endpoint regression smoke
        run: |
          python scripts/ci_api_smoke.py

  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker build smoke
        run: |
          docker build -t chapter-coverage-map:ci .
